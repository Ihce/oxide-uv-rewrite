name: Tests

on:
  push:
    branches: [main]

jobs:
  test:
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Set up Python
        run: uv python install

      - name: Install dependencies
        run: uv sync --dev

      - name: Create oxide config
        run: |
          mkdir -p ~/.config/oxide ~/.local/share/oxide
          cat > ~/.config/oxide/.config.txt << 'CONF'
          [dir]
          config = ~/.config/oxide/.config.txt
          root = ${{ github.workspace }}/src/oxide
          oxide = ${{ github.workspace }}/src/oxide/core
          libraries = ${{ github.workspace }}/src/oxide/core/libraries
          modules = ${{ github.workspace }}/src/oxide/modules
          plugins = ~/.local/share/oxide/plugins
          plugins_dev = ~/.local/share/oxide/plugins_dev
          data_dir = ~/.local/share/oxide
          datasets = ~/.local/share/oxide/datasets
          datastore = ~/.local/share/oxide/db
          localstore = ~/.local/share/oxide/localstore
          logs = ~/.local/share/oxide
          reference = ~/.local/share/oxide/reference
          scratch = ~/.local/share/oxide/scratch
          sample_dataset = ~/.local/share/oxide/datasets/sample_dataset
          ghidra_path =
          ghidra_path2 =
          ghidra_path3 =
          ghidra_path4 =
          ghidra_path5 =
          ida_path =
          ghidra_project = ~/.local/share/oxide/scratch
          scripts = ${{ github.workspace }}/scripts
          local_llm_path =

          [interface]
          page_size = 0

          [datastore]
          datastore = filesystem
          serialization = pickle

          [logging]
          level = INFO
          rotate = false
          max_log_size = 10
          num_log_files = 5

          [verbosity]
          level = INFO

          [multiproc]
          on = false
          max = 3

          [file]
          max = 1048576
          process_unrecognized_formats = false

          [distributed]
          port = 8000
          compute_nodes = localhost

          [dev_mode]
          enable = True

          [django]
          ip = 0.0.0.0
          port = 8888

          [plugins]
          default = True

          [history]
          file = ~/.local/share/oxide/.history.txt
          max = 200

          [ghidra_project]
          project_name = ghidraBenchmarking

          [pharos]
          docker_image =

          [probdisasm]
          docker_image =
          CONF

      - name: Run module import tests
        run: uv run pytest src/oxide/test/test_module_imports.py

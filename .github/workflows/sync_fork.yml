name: Sync Fork

on:
  schedule:
    - cron: '0 6 * * *'
  workflow_dispatch:

jobs:
  sync:
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Sync fork
        run: |
          git remote add upstream https://github.com/Program-Understanding/oxide.git || true
          git fetch upstream
          git merge upstream/main --no-edit -X theirs
          git checkout HEAD -- .github/workflows/
          git commit --amend --no-edit
          git push origin main

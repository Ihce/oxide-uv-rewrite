name: Oxide Test Runner

on:
  push:
    branches: [main]

concurrency:
  group: oxide-test
  cancel-in-progress: true

jobs:
  oxide-test:
    name: Oxide Test Runner
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Clean PATH
        run: echo "PATH=$(echo $PATH | tr ':' '\n' | grep -v anaconda | tr '\n' ':')" >> $GITHUB_ENV

      - name: Install uv
        uses: astral-sh/setup-uv@v6
        with:
          cache-local-path: /home/tools/Projects/ci_pipeline/.uv-cache

      - name: Set up Python
        run: uv python install 3.13

      - name: Install dependencies
        run: uv sync --dev --python 3.13

      - name: Find latest Ghidra
        run: |
          GHIDRA_PATH=$(ls -d ~/.local/opt/gvm/ghidra_* 2>/dev/null | sort -V | tail -1)
          echo "GHIDRA_PATH=${GHIDRA_PATH}" >> $GITHUB_ENV

      - name: Create oxide config
        run: |
          mkdir -p $HOME/.config/oxide
          rm -rf $HOME/.local/share/oxide/db
          rm -rf $HOME/.local/share/oxide/localstore
          rm -rf $HOME/.local/share/oxide/scratch
          cat > $HOME/.config/oxide/.config.txt << CONF
          [dir]
          config = $HOME/.config/oxide/.config.txt
          root = ${{ github.workspace }}/src/oxide
          oxide = ${{ github.workspace }}/src/oxide/core
          libraries = ${{ github.workspace }}/src/oxide/core/libraries
          modules = ${{ github.workspace }}/src/oxide/modules
          plugins = $HOME/.local/share/oxide/plugins
          plugins_dev = $HOME/.local/share/oxide/plugins_dev
          data_dir = $HOME/.local/share/oxide
          datasets = $HOME/.local/share/oxide/datasets
          datastore = $HOME/.local/share/oxide/db
          localstore = $HOME/.local/share/oxide/localstore
          logs = $HOME/.local/share/oxide
          reference = $HOME/.local/share/oxide/reference
          scratch = $HOME/.local/share/oxide/scratch
          sample_dataset = $HOME/.local/share/oxide/datasets/sample_dataset
          ghidra_path = ${GHIDRA_PATH}
          ghidra_path2 =
          ghidra_path3 =
          ghidra_path4 =
          ghidra_path5 =
          ida_path =
          ghidra_project = $HOME/.local/share/oxide/scratch
          scripts = ${{ github.workspace }}/scripts
          local_llm_path =

          [interface]
          page_size = 0

          [datastore]
          datastore = filesystem
          serialization = pickle

          [logging]
          level = INFO
          rotate = false
          max_log_size = 10
          num_log_files = 5

          [verbosity]
          level = INFO

          [multiproc]
          on = false
          max = 3

          [file]
          max = 1048576
          process_unrecognized_formats = false

          [distributed]
          port = 8000
          compute_nodes = localhost

          [dev_mode]
          enable = True

          [django]
          ip = 0.0.0.0
          port = 8888

          [plugins]
          default = True

          [history]
          file = ~/.local/share/oxide/.history.txt
          max = 200

          [ghidra_project]
          project_name = ghidraBenchmarking

          [pharos]
          docker_image =

          [probdisasm]
          docker_image =
          CONF

      - name: Run tests
        id: tests
        continue-on-error: true
        run: uv run pytest src/oxide/test/test_module_imports.py --junitxml=test-results.xml -v

      - name: Generate report
        if: always()
        run: |
          SUMMARY_PATH="$GITHUB_STEP_SUMMARY" uv run python3 << 'SCRIPT'
          import os
          import re
          import subprocess
          import xml.etree.ElementTree as ET
          from collections import defaultdict

          summary_path = os.environ["SUMMARY_PATH"]

          if not os.path.exists("test-results.xml"):
              with open(summary_path, "w") as f:
                  f.write("## :x: Test Results\n\nNo test-results.xml found — tests may have failed to start.\n")
              raise SystemExit(0)

          tree = ET.parse("test-results.xml")
          root = tree.getroot()

          PER_BINARY_SUITES = {
              "TestExtractorPerBinary",
              "TestAnalyzerPerBinary",
              "TestMapReducerPerBinary",
          }

          IMPORT_SUITES = {
              "TestSourceImports",
              "TestExtractorImports",
              "TestAnalyzerImports",
              "TestMapReducerImports",
          }

          # matrix[suite][module][(arch, os)] = (status, msg)
          matrix = defaultdict(lambda: defaultdict(dict))
          matrix_targets = set()
          import_errors = []  # (module, reason)

          for tc in root.iter("testcase"):
              suite = tc.get("classname", "unknown").split(".")[-1]
              name = tc.get("name")
              failure = tc.find("failure")
              error = tc.find("error")
              skipped = tc.find("skipped")

              if skipped is not None:
                  msg = skipped.get("message", "").split("\n")[0]
                  status = "skip"
              elif failure is not None:
                  msg = failure.get("message", "").split("\n")[0]
                  status = "fail"
              elif error is not None:
                  msg = error.get("message", "").split("\n")[0]
                  status = "error"
              else:
                  msg = ""
                  status = "pass"

              if suite in PER_BINARY_SUITES:
                  m = re.search(r'\[(.+?)\|(.+?)-(.+?)\|(.+?)\]', name)
                  if m:
                      mod_name = m.group(1)
                      arch = m.group(2)
                      os_name = m.group(3)
                      target = (arch, os_name)
                      matrix_targets.add(target)
                      matrix[suite][mod_name][target] = (status, msg)
              elif suite in IMPORT_SUITES and status in ("fail", "error", "skip"):
                  mod_name = name.split("[", 1)[1].rstrip("]") if "[" in name else name
                  import_errors.append((suite, mod_name, status, msg))

          # ---- Count totals ----
          matrix_total = 0
          matrix_pass = 0
          matrix_fail = 0
          matrix_skip = 0
          for suite_data in matrix.values():
              for mod_data in suite_data.values():
                  for st, _ in mod_data.values():
                      matrix_total += 1
                      if st == "pass": matrix_pass += 1
                      elif st in ("fail", "error"): matrix_fail += 1
                      elif st == "skip": matrix_skip += 1

          with open(summary_path, "w") as f:
              f.write("| | Tests | Passed :white_check_mark: | Skipped :fast_forward: | Failed :x: |\n")
              f.write("|---|---|---|---|---|\n")
              f.write(f"| Oxide Test Report | {matrix_total} ran | {matrix_pass} passed | {matrix_skip} skipped | {matrix_fail} failed |\n\n")

              # ---- Import errors ----
              if import_errors:
                  f.write("## Import Errors\n\n")
                  for suite, mod_name, status, msg in sorted(import_errors):
                      icon = ":fast_forward:" if status == "skip" else ":x:"
                      f.write(f"- {icon} **{mod_name}**: `{msg}`\n")
                  f.write("\n")

              # ---- Per-binary matrices ----
              if matrix:
                  targets = sorted(matrix_targets, key=lambda t: (t[1], t[0]))

                  suite_labels = {
                      "TestExtractorPerBinary": "Extractor",
                      "TestAnalyzerPerBinary": "Analyzer",
                      "TestMapReducerPerBinary": "Map Reducer",
                  }

                  for suite_name, modules in matrix.items():
                      label = suite_labels.get(suite_name, suite_name)
                      f.write(f"## {label} Compatibility Matrix\n\n")

                      target_headers = [f"{arch}/{os_n}" for arch, os_n in targets]
                      f.write(f"| Module | {' | '.join(target_headers)} | Score |\n")
                      f.write(f"|--------| {' | '.join(['------'] * len(targets))} |-------|\n")

                      for mod_name in sorted(modules.keys()):
                          results = modules[mod_name]
                          cells = []
                          passes = 0
                          total = 0
                          for target in targets:
                              entry = results.get(target)
                              if entry is None:
                                  cells.append("—")
                                  continue
                              st, _ = entry
                              if st == "pass":
                                  cells.append(":white_check_mark:")
                                  passes += 1
                                  total += 1
                              elif st in ("fail", "error"):
                                  cells.append(":x:")
                                  total += 1
                              elif st == "skip":
                                  cells.append(":fast_forward:")
                                  total += 1
                          score = f"{passes}/{total}" if total > 0 else "—"
                          f.write(f"| {mod_name} | {' | '.join(cells)} | {score} |\n")

                      f.write("\n")

                      # ---- Failures by module with error messages ----
                      failures_by_module = defaultdict(dict)
                      for mod_name, results in modules.items():
                          for target, entry in results.items():
                              st, msg = entry
                              if st in ("fail", "error"):
                                  failures_by_module[mod_name][target] = msg

                      if failures_by_module:
                          for mod_name in sorted(failures_by_module.keys()):
                              target_msgs = failures_by_module[mod_name]
                              unique_msgs = set(target_msgs.values())
                              f.write(f"**{mod_name}**\n")
                              if len(unique_msgs) == 1:
                                  msg = list(unique_msgs)[0].replace("|", "\\|")[:200]
                                  f.write(f"- All platforms: `{msg}`\n")
                              else:
                                  for target in sorted(target_msgs.keys()):
                                      arch, os_n = target
                                      msg = target_msgs[target].replace("|", "\\|")[:200]
                                      f.write(f"- {arch}/{os_n}: `{msg}`\n")
                              f.write("\n")

          SCRIPT

      - name: Check results
        if: steps.tests.outcome == 'failure'
        run: exit 1

name: Oxide Test Runner

on:
  push:
    branches: [main]

concurrency:
  group: oxide-test
  cancel-in-progress: true

jobs:
  oxide-test:
    name: Oxide Test Runner
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          cache-local-path: /home/tools/Projects/ci_pipeline/.uv-cache

      - name: Set up Python
        run: uv python install 3.13

      - name: Install dependencies
        run: uv sync --dev --extra full --python 3.13

      - name: Find latest Ghidra
        run: |
          GHIDRA_PATH=$(ls -d ~/.local/opt/gvm/ghidra_* 2>/dev/null | sort -V | tail -1)
          echo "GHIDRA_PATH=${GHIDRA_PATH}" >> $GITHUB_ENV

      - name: Create oxide config
        run: |
          mkdir -p ~/.config/oxide ~/.local/share/oxide
          cat > ~/.config/oxide/.config.txt << CONF
          [dir]
          config = ~/.config/oxide/.config.txt
          root = ${{ github.workspace }}/src/oxide
          oxide = ${{ github.workspace }}/src/oxide/core
          libraries = ${{ github.workspace }}/src/oxide/core/libraries
          modules = ${{ github.workspace }}/src/oxide/modules
          plugins = ~/.local/share/oxide/plugins
          plugins_dev = ~/.local/share/oxide/plugins_dev
          data_dir = ~/.local/share/oxide
          datasets = ~/.local/share/oxide/datasets
          datastore = ~/.local/share/oxide/db
          localstore = ~/.local/share/oxide/localstore
          logs = ~/.local/share/oxide
          reference = ~/.local/share/oxide/reference
          scratch = ~/.local/share/oxide/scratch
          sample_dataset = ~/.local/share/oxide/datasets/sample_dataset
          ghidra_path = ${GHIDRA_PATH}
          ghidra_path2 =
          ghidra_path3 =
          ghidra_path4 =
          ghidra_path5 =
          ida_path =
          ghidra_project = ~/.local/share/oxide/scratch
          scripts = ${{ github.workspace }}/scripts
          local_llm_path =

          [interface]
          page_size = 0

          [datastore]
          datastore = filesystem
          serialization = pickle

          [logging]
          level = INFO
          rotate = false
          max_log_size = 10
          num_log_files = 5

          [verbosity]
          level = INFO

          [multiproc]
          on = false
          max = 3

          [file]
          max = 1048576
          process_unrecognized_formats = false

          [distributed]
          port = 8000
          compute_nodes = localhost

          [dev_mode]
          enable = True

          [django]
          ip = 0.0.0.0
          port = 8888

          [plugins]
          default = True

          [history]
          file = ~/.local/share/oxide/.history.txt
          max = 200

          [ghidra_project]
          project_name = ghidraBenchmarking

          [pharos]
          docker_image =

          [probdisasm]
          docker_image =
          CONF

      - name: Run tests
        id: tests
        continue-on-error: true
        run: uv run pytest src/oxide/test/test_module_imports.py --junitxml=test-results.xml

      - name: Generate report
        if: always()
        run: |
          SUMMARY_PATH="$GITHUB_STEP_SUMMARY" python3 << 'SCRIPT'
          import os
          import xml.etree.ElementTree as ET

          summary_path = os.environ["SUMMARY_PATH"]
          tree = ET.parse("test-results.xml")
          root = tree.getroot()

          suites = {}
          for tc in root.iter("testcase"):
              suite = tc.get("classname", "unknown").split(".")[-1]
              name = tc.get("name")
              time = float(tc.get("time", 0))
              failure = tc.find("failure")
              error = tc.find("error")
              skipped = tc.find("skipped")

              if skipped is not None:
                  msg = skipped.get("message", "").split("\n")[0]
                  status = "skip"
              elif failure is not None:
                  msg = failure.get("message", "").split("\n")[0]
                  status = "fail"
              elif error is not None:
                  msg = error.get("message", "").split("\n")[0]
                  status = "error"
              else:
                  msg = ""
                  status = "pass"

              suites.setdefault(suite, []).append((name, status, msg, time))

          def clean_name(n):
              if "[" in n:
                  n = n.split("[", 1)[1].rstrip("]")
              elif n.startswith("test_"):
                  n = n[5:]
              return n

          def format_suite(n):
              import re
              return re.sub(r'(?<=[a-z])(?=[A-Z])', ' ', n)

          total_tests = sum(len(t) for t in suites.values())
          total_pass = sum(1 for s in suites.values() for _, st, _, _ in s if st == "pass")
          total_fail = sum(1 for s in suites.values() for _, st, _, _ in s if st in ("fail", "error"))
          total_skip = sum(1 for s in suites.values() for _, st, _, _ in s if st == "skip")

          with open(summary_path, "w") as f:
              f.write("| | Tests | Passed :white_check_mark: | Skipped :fast_forward: | Failed :x: |\n")
              f.write("|---|---|---|---|---|\n")
              f.write(f"| Oxide Test Report | {total_tests} ran | {total_pass} passed | {total_skip} skipped | {total_fail} failed |\n\n")

              for suite, tests in suites.items():
                  passed = [t for t in tests if t[1] == "pass"]
                  failed = [t for t in tests if t[1] in ("fail", "error")]
                  skipped = [t for t in tests if t[1] == "skip"]

                  f.write(f"## {format_suite(suite)}\n\n")

                  if failed:
                      f.write("| Module | Result | Duration | Reason |\n")
                      f.write("|--------|--------|----------|--------|\n")
                      for name, _, msg, time in failed:
                          f.write(f"| {clean_name(name)} | :x: | {time:.1f}s | {msg} |\n")
                      f.write("\n")

                  if skipped:
                      f.write("| Module | Result | Duration | Reason |\n")
                      f.write("|--------|--------|----------|--------|\n")
                      for name, _, msg, time in skipped:
                          f.write(f"| {clean_name(name)} | :fast_forward: | {time:.1f}s | {msg} |\n")
                      f.write("\n")

                  if passed:
                      f.write(f":white_check_mark: {len(passed)} passed\n\n")

          SCRIPT

      - name: Check results
        if: steps.tests.outcome == 'failure'
        run: exit 1
